<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="-apple-system, system-ui, sans-serif">
  <title>Axis 2 — Pareto frontier of 7 physics-injection mechanisms</title>
  <desc>2D scatter of 7 v2 injection mechanisms on the Fidelity vs Expressivity Pareto frontier. Each anchor dissection lies on or near the curve.</desc>

  <defs>
    <marker id="arr-axis" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#bbb"/>
    </marker>
    <marker id="arr-anno" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="24" text-anchor="middle" fill="#bbb" font-size="15" font-weight="700">Axis 2 — 7 種 v2 injection 的 Pareto 前沿</text>
  <text x="450" y="42" text-anchor="middle" fill="#888" font-size="11" font-style="italic">本 handbook USP — 每個 anchor dissection 落在 Pareto 上某點</text>

  <!-- Plot area background -->
  <rect x="100" y="70" width="700" height="450" rx="6" fill="#0a0a14" stroke="#333" stroke-width="1"/>

  <!-- Grid (subtle) -->
  <g stroke="#1f1f2e" stroke-width="1">
    <line x1="100" y1="160" x2="800" y2="160"/>
    <line x1="100" y1="250" x2="800" y2="250"/>
    <line x1="100" y1="340" x2="800" y2="340"/>
    <line x1="100" y1="430" x2="800" y2="430"/>
    <line x1="240" y1="70" x2="240" y2="520"/>
    <line x1="380" y1="70" x2="380" y2="520"/>
    <line x1="520" y1="70" x2="520" y2="520"/>
    <line x1="660" y1="70" x2="660" y2="520"/>
  </g>

  <!-- Axes -->
  <line x1="100" y1="520" x2="820" y2="520" stroke="#bbb" stroke-width="2" marker-end="url(#arr-axis)"/>
  <line x1="100" y1="520" x2="100" y2="55" stroke="#bbb" stroke-width="2" marker-end="url(#arr-axis)"/>

  <!-- Axis labels -->
  <text x="450" y="555" text-anchor="middle" fill="#bbb" font-size="13" font-weight="700">→ 物理嚴格度 (Fidelity)</text>
  <text x="540" y="572" text-anchor="middle" fill="#888" font-size="10" font-style="italic">low · soft prior · sim-grounded · hard law</text>
  <g transform="translate(40,300) rotate(-90)">
    <text x="0" y="0" text-anchor="middle" fill="#bbb" font-size="13" font-weight="700">↑ 表達力 (Expressivity / Generalization)</text>
  </g>
  <g transform="translate(58,300) rotate(-90)">
    <text x="0" y="0" text-anchor="middle" fill="#888" font-size="10" font-style="italic">scale-pilled · open-domain · narrow regime</text>
  </g>

  <!-- ====================== Pareto curve ====================== -->
  <!-- through: data-only(750,140) → aux-loss(560,200) → arch-bias-soft(480,250) → guidance-grad(420,310) → sim-infer(530,360) → sim-train(620,400) → hard(740,460) -->
  <path d="M 760,135 C 680,150 600,180 555,205 S 490,235 475,250 C 450,275 430,290 420,310 C 440,340 500,355 530,365 C 580,380 600,395 625,405 C 680,425 720,445 745,460"
        fill="none" stroke="#e94560" stroke-width="2" stroke-dasharray="6 4" opacity="0.7"/>
  <text x="365" y="245" fill="#e94560" font-size="11" font-style="italic" font-weight="700">Pareto frontier</text>

  <!-- Corner annotations -->
  <g>
    <line x1="730" y1="115" x2="765" y2="135" stroke="#888" stroke-width="1" marker-end="url(#arr-anno)"/>
    <rect x="610" y="92" width="125" height="28" rx="4" fill="#1e1a0f" stroke="#f9c74f" stroke-width="1"/>
    <text x="672" y="110" text-anchor="middle" fill="#f9c74f" font-size="11" font-weight="700">Hard but narrow</text>
  </g>
  <g>
    <line x1="700" y1="490" x2="745" y2="465" stroke="#888" stroke-width="1" marker-end="url(#arr-anno)"/>
    <rect x="585" y="490" width="130" height="28" rx="4" fill="#1a1a2e" stroke="#888" stroke-width="1"/>
    <text x="650" y="508" text-anchor="middle" fill="#bbb" font-size="11" font-weight="700">Scale-pilled bet</text>
  </g>

  <!-- ====================== 7 POINTS ====================== -->

  <!-- 1. data-only — top-right (high expressivity, low-mid fidelity) -->
  <g>
    <circle cx="240" cy="120" r="11" fill="#888" stroke="#fff" stroke-width="1.5"/>
    <text x="260" y="118" fill="#fff" font-size="12" font-weight="700">data-only</text>
    <text x="260" y="132" fill="#bbb" font-size="10">Sora · Veo · Cosmos-Predict</text>
  </g>

  <!-- 2. aux-loss — middle (balanced) -->
  <g>
    <circle cx="395" cy="215" r="11" fill="#06a0a0" stroke="#fff" stroke-width="1.5"/>
    <text x="415" y="213" fill="#fff" font-size="12" font-weight="700">aux-loss</text>
    <text x="415" y="227" fill="#bbb" font-size="10">PINN · PhysGen aux</text>
  </g>

  <!-- 6. architecture-bias-soft — v2 NEW -->
  <g>
    <circle cx="475" cy="260" r="13" fill="#9d4edd" stroke="#fff" stroke-width="2"/>
    <text x="495" y="258" fill="#fff" font-size="12" font-weight="700">architecture-bias-soft</text>
    <rect x="495" y="266" width="60" height="14" rx="3" fill="#9d4edd"/>
    <text x="525" y="277" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">v2 NEW</text>
    <text x="560" y="277" fill="#bbb" font-size="10">NewtonGen · GraphCast · FNO · MeshGraphNet</text>
  </g>

  <!-- 5. guidance-gradient — left-center -->
  <g>
    <circle cx="425" cy="335" r="11" fill="#e94560" stroke="#fff" stroke-width="1.5"/>
    <text x="170" y="333" fill="#fff" font-size="12" font-weight="700" text-anchor="start">guidance-gradient</text>
    <text x="170" y="347" fill="#bbb" font-size="10" text-anchor="start">PhysDiff · Force Prompting · CFG</text>
    <line x1="335" y1="335" x2="412" y2="335" stroke="#666" stroke-width="1" stroke-dasharray="2 2"/>
  </g>

  <!-- 4. sim-in-loop-infer — center -->
  <g>
    <circle cx="540" cy="370" r="11" fill="#fcae5b" stroke="#fff" stroke-width="1.5"/>
    <text x="560" y="368" fill="#fff" font-size="12" font-weight="700">sim-in-loop-infer</text>
    <text x="560" y="382" fill="#bbb" font-size="10">PhysDiff · Cosmos-Reason eval</text>
  </g>

  <!-- 3. sim-in-loop-train — center-right -->
  <g>
    <circle cx="625" cy="410" r="11" fill="#f77f00" stroke="#fff" stroke-width="1.5"/>
    <text x="645" y="408" fill="#fff" font-size="12" font-weight="700">sim-in-loop-train</text>
    <text x="645" y="422" fill="#bbb" font-size="10">Genesis · MJX · Aerial Gym</text>
  </g>

  <!-- 7. hard-constraint — top-right of plot (max fidelity, very low expressivity = high in plot) -->
  <!-- Reinterpreting: in this plot high-x = high fidelity, low-y position = low expressivity. So hard-constraint sits bottom-right -->
  <g>
    <circle cx="745" cy="465" r="11" fill="#f9c74f" stroke="#fff" stroke-width="1.5"/>
    <text x="555" y="478" fill="#fff" font-size="12" font-weight="700" text-anchor="start">hard-constraint</text>
    <text x="555" y="492" fill="#bbb" font-size="10" text-anchor="start">HNN · LNN · E(3)-equivariant</text>
    <line x1="680" y1="475" x2="732" y2="468" stroke="#666" stroke-width="1" stroke-dasharray="2 2"/>
  </g>

  <!-- Footer caption -->
  <rect x="100" y="578" width="700" height="20" rx="3" fill="#0f3460" stroke="#e94560" stroke-width="1"/>
  <text x="450" y="592" text-anchor="middle" fill="#fff" font-size="10">每個 anchor 都是 (Fidelity, Expressivity) 平面上的一個座標 — 沒有銀彈，只有 trade-off</text>
</svg>
