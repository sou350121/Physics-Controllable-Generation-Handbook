<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="-apple-system, system-ui, sans-serif">
  <title>Physics-Controllable Generation as the tensor product of 5 orthogonal axes (Ontology v2.0)</title>
  <desc>Radial diagram of 5 axes (Output, Physics Injection, Controllability, Temporal, Domain) with Axis 2 highlighted as the handbook USP.</desc>

  <defs>
    <marker id="arr-spoke" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#bbb"/>
    </marker>
  </defs>

  <!-- Header -->
  <text x="450" y="22" text-anchor="middle" fill="#bbb" font-size="14" font-weight="700">Physics-Controllable Generation — 5 軸張量積本體論</text>
  <text x="450" y="40" text-anchor="middle" fill="#888" font-size="11" font-style="italic">Ontology v2.0 — 2026-05-26 · 每個方法都是 5 軸上的一條座標</text>

  <!-- ====================== CENTER HUB ====================== -->
  <circle cx="450" cy="310" r="78" fill="#0f3460" stroke="#e94560" stroke-width="3"/>
  <text x="450" y="296" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Physics-Controllable</text>
  <text x="450" y="313" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Generation</text>
  <text x="450" y="332" text-anchor="middle" fill="#f77f00" font-size="10">(7-injection USP)</text>
  <text x="450" y="348" text-anchor="middle" fill="#bbb" font-size="9" font-style="italic">座標</text>

  <!-- ====================== AXIS 1: Output (top) ====================== -->
  <line x1="450" y1="232" x2="450" y2="120" stroke="#4361ee" stroke-width="2" marker-end="url(#arr-spoke)"/>
  <rect x="320" y="55" width="260" height="70" rx="8" fill="#1a1a2e" stroke="#4361ee" stroke-width="2"/>
  <text x="450" y="76" text-anchor="middle" fill="#4361ee" font-size="14" font-weight="700">① Output Space</text>
  <text x="450" y="93" text-anchor="middle" fill="#fff" font-size="10">pixel-video · latent-tokens · 3d-explicit</text>
  <text x="450" y="106" text-anchor="middle" fill="#fff" font-size="10">field · motion-trajectory</text>
  <text x="450" y="120" text-anchor="middle" fill="#888" font-size="9" font-style="italic">e.g. Sora · V-JEPA · GraphCast</text>

  <!-- ====================== AXIS 2: Physics Injection (upper-right) ★ USP ====================== -->
  <line x1="514" y1="265" x2="700" y2="155" stroke="#e94560" stroke-width="3" marker-end="url(#arr-spoke)"/>
  <rect x="660" y="80" width="230" height="90" rx="10" fill="#1a1a2e" stroke="#e94560" stroke-width="3"/>
  <text x="775" y="100" text-anchor="middle" fill="#e94560" font-size="15" font-weight="700">② Physics Injection ★</text>
  <text x="775" y="116" text-anchor="middle" fill="#fff" font-size="10">data-only · aux-loss · sim-in-loop</text>
  <text x="775" y="129" text-anchor="middle" fill="#fff" font-size="10">guidance-gradient · arch-bias-soft</text>
  <text x="775" y="142" text-anchor="middle" fill="#fff" font-size="10">hard-constraint  (7 mechanisms)</text>
  <text x="775" y="160" text-anchor="middle" fill="#888" font-size="9" font-style="italic">e.g. PhysDiff · NewtonGen · HNN</text>

  <!-- USP badge -->
  <rect x="660" y="180" width="230" height="32" rx="6" fill="#3a1a1a" stroke="#e94560" stroke-width="1.5"/>
  <text x="775" y="194" text-anchor="middle" fill="#e94560" font-size="10" font-weight="700">本 handbook USP</text>
  <text x="775" y="206" text-anchor="middle" fill="#fff" font-size="9">沒有其他 handbook 有此軸</text>

  <!-- ====================== AXIS 3: Controllability Input (lower-right) ====================== -->
  <line x1="514" y1="355" x2="700" y2="465" stroke="#9d4edd" stroke-width="2" marker-end="url(#arr-spoke)"/>
  <rect x="660" y="450" width="230" height="80" rx="8" fill="#1a1a2e" stroke="#9d4edd" stroke-width="2"/>
  <text x="775" y="470" text-anchor="middle" fill="#9d4edd" font-size="14" font-weight="700">③ Controllability Input</text>
  <text x="775" y="487" text-anchor="middle" fill="#fff" font-size="10">text · action · trajectory · force</text>
  <text x="775" y="500" text-anchor="middle" fill="#fff" font-size="10">contact · camera · layout · 3d-init</text>
  <text x="775" y="518" text-anchor="middle" fill="#888" font-size="9" font-style="italic">e.g. RT-2 · Force Prompting · CAT4D</text>

  <!-- ====================== AXIS 4: Temporal Paradigm (lower-left) ====================== -->
  <line x1="386" y1="355" x2="200" y2="465" stroke="#f77f00" stroke-width="2" marker-end="url(#arr-spoke)"/>
  <rect x="10" y="450" width="240" height="80" rx="8" fill="#1a1a2e" stroke="#f77f00" stroke-width="2"/>
  <text x="130" y="470" text-anchor="middle" fill="#f77f00" font-size="14" font-weight="700">④ Temporal Paradigm</text>
  <text x="130" y="487" text-anchor="middle" fill="#fff" font-size="10">single-frame · streaming · autoreg</text>
  <text x="130" y="500" text-anchor="middle" fill="#fff" font-size="10">clip-parallel · latent-rollout · cache</text>
  <text x="130" y="518" text-anchor="middle" fill="#888" font-size="9" font-style="italic">e.g. Cosmos · Lumiere · Open-Sora</text>

  <!-- ====================== AXIS 5: Domain Coupling (upper-left) ====================== -->
  <line x1="386" y1="265" x2="200" y2="155" stroke="#06a0a0" stroke-width="2" marker-end="url(#arr-spoke)"/>
  <rect x="10" y="80" width="240" height="80" rx="8" fill="#1a1a2e" stroke="#06a0a0" stroke-width="2"/>
  <text x="130" y="100" text-anchor="middle" fill="#06a0a0" font-size="14" font-weight="700">⑤ Domain Coupling</text>
  <text x="130" y="117" text-anchor="middle" fill="#fff" font-size="10">generalist · robotics · driving</text>
  <text x="130" y="130" text-anchor="middle" fill="#fff" font-size="10">fluid · rigid · soft · weather · astro</text>
  <text x="130" y="148" text-anchor="middle" fill="#888" font-size="9" font-style="italic">e.g. Cosmos-Predict · GAIA · Pangu</text>

  <!-- ====================== EXAMPLE COORDINATE STRIP ====================== -->
  <rect x="60" y="555" width="780" height="36" rx="6" fill="#0a0a14" stroke="#555" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="450" y="571" text-anchor="middle" fill="#bbb" font-size="11" font-style="italic">範例：PhysDiff 在 5 軸的座標 (anchor dissection)</text>
  <text x="450" y="585" text-anchor="middle" fill="#fff" font-size="11">
    <tspan fill="#4361ee">pixel-video</tspan> · <tspan fill="#e94560">guidance-gradient</tspan> · <tspan fill="#9d4edd">text+action</tspan> · <tspan fill="#f77f00">clip-parallel</tspan> · <tspan fill="#06a0a0">robotics</tspan>
  </text>
</svg>
