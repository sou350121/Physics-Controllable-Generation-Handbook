<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 480" font-family="-apple-system, system-ui, sans-serif">
  <title>Physics Conditioning Evolution 2017 to 2026 — 5 generations across 7 v2 injection mechanisms</title>
  <desc>Horizontal swimlane timeline of physics-injection mechanisms in generative models. Lanes: aux-loss (PINN, PhysGen aux), hard-constraint (HNN, Symplectic ODE-Net, LNN), architecture-bias-soft (MeshGraphNet, GraphCast, NewtonGen) marked v2 NEW, guidance-gradient (PhysDiff, Force Prompting), sim-in-loop-train (Genesis, PhysGen, PhysGen3D), sim-in-loop-infer (Cosmos Reason1). Hard-constraint lane stalls after 2020 while sim-in-loop explodes 2024-25.</desc>

  <!-- Title -->
  <text x="550" y="20" text-anchor="middle" fill="#bbb" font-size="14" font-weight="700">Physics Conditioning Evolution — 5 generations across 7 v2 injection mechanisms</text>
  <text x="550" y="36" text-anchor="middle" fill="#888" font-size="10" font-style="italic">2017 PINN → 2025 sim-in-loop hybrid · v2.0 ontology</text>

  <!-- Year axis at top -->
  <g font-size="10" fill="#888">
    <text x="210" y="56" text-anchor="middle">2017</text>
    <text x="304" y="56" text-anchor="middle">2018</text>
    <text x="398" y="56" text-anchor="middle">2019</text>
    <text x="492" y="56" text-anchor="middle">2020</text>
    <text x="586" y="56" text-anchor="middle">2021</text>
    <text x="680" y="56" text-anchor="middle">2022</text>
    <text x="774" y="56" text-anchor="middle">2023</text>
    <text x="868" y="56" text-anchor="middle">2024</text>
    <text x="962" y="56" text-anchor="middle">2025</text>
    <text x="1056" y="56" text-anchor="middle">2026</text>
  </g>

  <!-- Vertical dotted year boundaries -->
  <g stroke="#333" stroke-width="1" stroke-dasharray="2,3">
    <line x1="210" y1="64" x2="210" y2="430"/>
    <line x1="304" y1="64" x2="304" y2="430"/>
    <line x1="398" y1="64" x2="398" y2="430"/>
    <line x1="492" y1="64" x2="492" y2="430"/>
    <line x1="586" y1="64" x2="586" y2="430"/>
    <line x1="680" y1="64" x2="680" y2="430"/>
    <line x1="774" y1="64" x2="774" y2="430"/>
    <line x1="868" y1="64" x2="868" y2="430"/>
    <line x1="962" y1="64" x2="962" y2="430"/>
    <line x1="1056" y1="64" x2="1056" y2="430"/>
  </g>

  <!-- Horizontal lane top border -->
  <line x1="40" y1="64" x2="1080" y2="64" stroke="#555" stroke-width="1"/>

  <!-- ============ Lane 1: aux-loss (y=70..130) ============ -->
  <g>
    <rect x="40" y="70" width="160" height="60" fill="#0f3460" stroke="#06a0a0" stroke-width="1.5" rx="4"/>
    <text x="120" y="94" text-anchor="middle" fill="#06a0a0" font-size="12" font-weight="700">aux-loss</text>
    <text x="120" y="110" text-anchor="middle" fill="#bbb" font-size="9">PDE residual term</text>
    <text x="120" y="123" text-anchor="middle" fill="#888" font-size="8">soft loss penalty</text>

    <line x1="210" y1="100" x2="1060" y2="100" stroke="#06a0a0" stroke-width="1" stroke-opacity="0.25"/>

    <!-- 2017 PINN -->
    <circle cx="210" cy="100" r="6" fill="#06a0a0" stroke="#1a1a2e" stroke-width="2"/>
    <text x="220" y="92" fill="#fff" font-size="10" font-weight="700">PINN</text>
    <text x="220" y="123" fill="#888" font-size="9">Raissi 2017</text>

    <!-- 2024 PhysGen aux -->
    <circle cx="868" cy="100" r="6" fill="#06a0a0" stroke="#1a1a2e" stroke-width="2"/>
    <text x="858" y="92" text-anchor="end" fill="#fff" font-size="10" font-weight="700">PhysGen aux</text>
    <text x="858" y="123" text-anchor="end" fill="#888" font-size="9">ECCV 2024</text>
  </g>

  <!-- ============ Lane 2: hard-constraint (y=134..194) ============ -->
  <g>
    <rect x="40" y="134" width="160" height="60" fill="#0f3460" stroke="#f9c74f" stroke-width="1.5" rx="4"/>
    <text x="120" y="158" text-anchor="middle" fill="#f9c74f" font-size="12" font-weight="700">hard-constraint</text>
    <text x="120" y="174" text-anchor="middle" fill="#bbb" font-size="9">structural / symplectic</text>
    <text x="120" y="187" text-anchor="middle" fill="#888" font-size="8">conservation by design</text>

    <line x1="210" y1="164" x2="1060" y2="164" stroke="#f9c74f" stroke-width="1" stroke-opacity="0.25"/>

    <!-- 2019 HNN -->
    <circle cx="398" cy="164" r="6" fill="#f9c74f" stroke="#1a1a2e" stroke-width="2"/>
    <text x="388" y="156" text-anchor="end" fill="#fff" font-size="10" font-weight="700">HNN</text>
    <text x="388" y="187" text-anchor="end" fill="#888" font-size="9">Greydanus</text>

    <!-- 2019 Symplectic ODE-Net -->
    <circle cx="450" cy="164" r="5" fill="#f9c74f" stroke="#1a1a2e" stroke-width="2"/>
    <text x="460" y="156" fill="#fff" font-size="10" font-weight="700">Symplectic ODE-Net</text>
    <text x="460" y="187" fill="#888" font-size="9">2019</text>

    <!-- 2020 LNN -->
    <circle cx="492" cy="164" r="6" fill="#f9c74f" stroke="#1a1a2e" stroke-width="2"/>
    <text x="592" y="156" text-anchor="end" fill="#fff" font-size="10" font-weight="700">LNN</text>
    <text x="592" y="151" text-anchor="end" fill="#888" font-size="8" />

    <!-- Stagnation marker -->
    <line x1="540" y1="164" x2="1050" y2="164" stroke="#e94560" stroke-width="1" stroke-dasharray="4,3" stroke-opacity="0.55"/>
    <text x="780" y="180" text-anchor="middle" fill="#e94560" font-size="10" font-style="italic" font-weight="700">— stalled post-2020 —</text>
  </g>

  <!-- ============ Lane 3: architecture-bias-soft v2 NEW (y=198..258) ============ -->
  <g>
    <rect x="40" y="198" width="160" height="60" fill="#0f3460" stroke="#9d4edd" stroke-width="2.5" rx="4"/>
    <text x="120" y="220" text-anchor="middle" fill="#9d4edd" font-size="12" font-weight="700">architecture-bias-soft</text>
    <text x="120" y="236" text-anchor="middle" fill="#bbb" font-size="9">GNN / equivariant prior</text>
    <text x="120" y="251" text-anchor="middle" fill="#f77f00" font-size="10" font-weight="700">★ v2 NEW</text>

    <line x1="210" y1="228" x2="1060" y2="228" stroke="#9d4edd" stroke-width="1" stroke-opacity="0.25"/>

    <!-- 2020 MeshGraphNet -->
    <circle cx="492" cy="228" r="6" fill="#9d4edd" stroke="#1a1a2e" stroke-width="2"/>
    <text x="502" y="220" fill="#fff" font-size="10" font-weight="700">MeshGraphNet</text>
    <text x="502" y="251" fill="#888" font-size="9">DeepMind 2020</text>

    <!-- 2023 GraphCast -->
    <circle cx="774" cy="228" r="6" fill="#9d4edd" stroke="#1a1a2e" stroke-width="2"/>
    <text x="784" y="220" fill="#fff" font-size="10" font-weight="700">GraphCast</text>
    <text x="784" y="251" fill="#888" font-size="9">Science · moved v2</text>

    <!-- 2025 NewtonGen -->
    <circle cx="962" cy="228" r="6" fill="#9d4edd" stroke="#1a1a2e" stroke-width="2"/>
    <text x="952" y="220" text-anchor="end" fill="#fff" font-size="10" font-weight="700">NewtonGen</text>
    <text x="952" y="251" text-anchor="end" fill="#888" font-size="9">ICLR 2026</text>
  </g>

  <!-- ============ Lane 4: guidance-gradient (y=262..322) ============ -->
  <g>
    <rect x="40" y="262" width="160" height="60" fill="#0f3460" stroke="#e94560" stroke-width="1.5" rx="4"/>
    <text x="120" y="286" text-anchor="middle" fill="#e94560" font-size="12" font-weight="700">guidance-gradient</text>
    <text x="120" y="302" text-anchor="middle" fill="#bbb" font-size="9">classifier guidance</text>
    <text x="120" y="315" text-anchor="middle" fill="#888" font-size="8">diffusion test-time steer</text>

    <line x1="210" y1="292" x2="1060" y2="292" stroke="#e94560" stroke-width="1" stroke-opacity="0.25"/>

    <!-- 2022 PhysDiff -->
    <circle cx="680" cy="292" r="6" fill="#e94560" stroke="#1a1a2e" stroke-width="2"/>
    <text x="670" y="284" text-anchor="end" fill="#fff" font-size="10" font-weight="700">PhysDiff</text>
    <text x="670" y="315" text-anchor="end" fill="#888" font-size="9">ICCV 2023 Oral</text>

    <!-- 2025 Force Prompting -->
    <circle cx="962" cy="292" r="6" fill="#e94560" stroke="#1a1a2e" stroke-width="2"/>
    <text x="952" y="284" text-anchor="end" fill="#fff" font-size="10" font-weight="700">Force Prompting</text>
    <text x="952" y="315" text-anchor="end" fill="#888" font-size="9">NeurIPS 2025</text>
  </g>

  <!-- ============ Lane 5: sim-in-loop-train (y=326..386) ============ -->
  <g>
    <rect x="40" y="326" width="160" height="60" fill="#0f3460" stroke="#f77f00" stroke-width="1.5" rx="4"/>
    <text x="120" y="350" text-anchor="middle" fill="#f77f00" font-size="12" font-weight="700">sim-in-loop-train</text>
    <text x="120" y="366" text-anchor="middle" fill="#bbb" font-size="9">differentiable sim</text>
    <text x="120" y="379" text-anchor="middle" fill="#888" font-size="8">gradient through physics</text>

    <line x1="210" y1="356" x2="1060" y2="356" stroke="#f77f00" stroke-width="1" stroke-opacity="0.25"/>

    <!-- 2024 PhysGen -->
    <circle cx="850" cy="356" r="6" fill="#f77f00" stroke="#1a1a2e" stroke-width="2"/>
    <text x="840" y="348" text-anchor="end" fill="#fff" font-size="10" font-weight="700">PhysGen</text>
    <text x="840" y="379" text-anchor="end" fill="#888" font-size="9">ECCV 2024</text>

    <!-- 2024 Genesis (Dec) -->
    <circle cx="908" cy="356" r="6" fill="#f77f00" stroke="#1a1a2e" stroke-width="2"/>
    <text x="918" y="348" fill="#fff" font-size="10" font-weight="700">Genesis</text>
    <text x="918" y="379" fill="#888" font-size="9">Dec 2024</text>

    <!-- 2025 PhysGen3D -->
    <circle cx="980" cy="356" r="6" fill="#f77f00" stroke="#1a1a2e" stroke-width="2"/>
    <text x="1050" y="348" text-anchor="end" fill="#fff" font-size="10" font-weight="700">PhysGen3D</text>
    <text x="1050" y="379" text-anchor="end" fill="#888" font-size="9">CVPR 2025</text>
  </g>

  <!-- ============ Lane 6: sim-in-loop-infer lighter (y=390..430) ============ -->
  <g>
    <rect x="40" y="390" width="160" height="40" fill="#0f3460" stroke="#fab368" stroke-width="1.5" rx="4" stroke-dasharray="3,2"/>
    <text x="120" y="408" text-anchor="middle" fill="#fab368" font-size="12" font-weight="700">sim-in-loop-infer</text>
    <text x="120" y="422" text-anchor="middle" fill="#bbb" font-size="9">test-time sim verify</text>

    <line x1="210" y1="410" x2="1060" y2="410" stroke="#fab368" stroke-width="1" stroke-opacity="0.3"/>

    <!-- 2025 Cosmos Reason1 -->
    <circle cx="980" cy="410" r="6" fill="#fab368" stroke="#1a1a2e" stroke-width="2"/>
    <text x="970" y="404" text-anchor="end" fill="#fff" font-size="10" font-weight="700">Cosmos Reason1</text>
    <text x="970" y="423" text-anchor="end" fill="#888" font-size="9">NVIDIA 2025</text>
  </g>

  <!-- Caption -->
  <rect x="40" y="442" width="1020" height="30" rx="4" fill="#0a0a14" stroke="#555" stroke-width="1"/>
  <text x="50" y="461" fill="#fff" font-size="10">
    <tspan fill="#bbb" font-weight="700">Anti-stagnation:</tspan>
    <tspan fill="#f9c74f"> hard-constraint stalled post-2020</tspan>
    <tspan fill="#888">  ·  </tspan>
    <tspan fill="#f77f00" font-weight="700">2024-25 explosion in sim-in-loop hybrid</tspan>
    <tspan fill="#888">  ·  </tspan>
    <tspan fill="#9d4edd">v2 split data-only vs architecture-bias-soft</tspan>
    <tspan fill="#888">  ·  </tspan>
    <tspan fill="#bbb">2 mechanisms (data-only, control-condition) deliberately omitted from this lineage view</tspan>
  </text>
</svg>
